<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Login</title>
</head>
<body>
    
    <main>

        <div class="esquerda">
            <form action="" method="post">
                <h2>LOGIN</h2>
                <span>How to i get started lorem ipsum dolor at?</span><br><br>

                <div class="input_wrapper">
                    <img src="./icons/user-icon.svg" >
                    <input type="text" name="username" id="" placeholder="Username" required>
                </div>
                <div class="input_wrapper">
                    <img src="./icons/password-icon.svg" >
                    <input type="password" name="password" id="" placeholder="Password" required>
                </div>

                <input class="btn" type="submit" value="Login Now">

            </form>

            <div class="hr-strong">
                <div class="linha"></div>
                <h3><strong>Login</strong> with Others</h3>
                <div class="linha"></div>
            </div>
            <br>

            <div class="box-OAuth">
                <div class="btn-auth">
                    <img src="./imgs/google.svg">
                    <span>Login with <strong>Google</strong></span>
                </div>
                <div class="btn-auth">
                    <img src="./imgs/facebook.svg">
                    <span>Login with <strong>Facebook</strong></span>
                </div>
            </div>


        </div>

        <div class="direita">

        </div>


    </main>


</body>
</html>
